services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: meridiana-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: meridiana
      POSTGRES_PASSWORD: meridiana
      POSTGRES_DB: meridiana
    ports:
      - "5432:5432"
    volumes:
      - meridiana_pg:/var/lib/postgresql/data
      - ./ops/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meridiana -d meridiana"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: meridiana-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - meridiana_redis:/data

