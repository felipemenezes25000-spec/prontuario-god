# Railway — config-as-code para a API Meridiana.
# Deploy: conectar o repo no Railway, escolher "Empty Service" e apontar root=repo root.
# O build command inclui os packages workspace (ai-router, pii-redactor) que a API importa.

[build]
builder = "RAILPACK"
buildCommand = "pnpm install --frozen-lockfile && pnpm --filter '@meridiana/api...' build"

[deploy]
startCommand = "pnpm --filter @meridiana/api start"
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
